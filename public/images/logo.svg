<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="hsl(198,44%,36%)" opacity="0.10"/>
  <circle cx="60" cy="60" r="58" stroke="hsl(198,44%,36%)" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Bold teal S lettermark -->
  <path d="
    M74 38
    C74 29 67 23 58 23
    C49 23 42 29 42 38
    C42 47 50 51 60 54
    C70 57 78 61 78 72
    C78 81 71 87 62 87
    C53 87 46 81 46 72
  "
  stroke="hsl(198,44%,36%)"
  stroke-width="11"
  stroke-linecap="round"
  stroke-linejoin="round"
  fill="none"/>

  <!-- Rod of Asclepius — small, left side -->
  <line x1="33" y1="34" x2="33" y2="86" stroke="hsl(200,14%,24%)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Snake upper coil -->
  <path d="M33 44 C39 41 43 46 33 50" stroke="hsl(200,14%,24%)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Snake lower coil -->
  <path d="M33 58 C39 55 43 60 33 64" stroke="hsl(200,14%,24%)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Knob on top -->
  <circle cx="33" cy="32" r="3" fill="hsl(200,14%,24%)"/>
</svg>
